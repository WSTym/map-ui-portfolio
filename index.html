<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuelNaija - Track Fuel Stations</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
          crossorigin="" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
    <div class="app-layout">
        <div class="map-container">
            <div id="map"></div>
            <div class="legend-container">
                <div class="legend-item">
                    <div class="legend-dot open"></div>
                    <span>None / Short Queue</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot limited"></div>
                    <span>Medium Queue</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot closed"></div>
                    <span>Long Queue</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot unknown"></div>
                    <span>Closed / Unknown</span>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <header class="header">
                <div class="brand">
                    <svg class="brand-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2C8.686 2 6 4.686 6 8c0 4 6 12 6 12s6-8 6-12c0-3.314-2.686-6-6-6z"/>
                        <circle cx="12" cy="8" r="2" fill="currentColor"/>
                    </svg>
                    <h1 class="brand-name">fuelnaija</h1>
                </div>

                <div class="search-container">
                    <input 
                        type="text" 
                        class="search-input" 
                        id="searchInput" 
                        placeholder="Search by station name, brand, or area..."
                    >
                </div>

                <div class="filters-container">
                    <button class="filter-chip active">All</button>
                    <button class="filter-chip">Short Queue</button>
                    <button class="filter-chip">Open</button>
                    <button class="filter-chip">Near Me</button>
                </div>

                <button class="location-btn" id="locationBtn">
                    <span>📍</span>
                    Use My Location
                </button>
                <div class="status-text" id="statusText">Click to find nearest stations</div>
            </header>

            <div class="stations-container">
                <h2 class="stations-title">Fuel Stations</h2>
                <div id="stationsList">
                    <div class="loading">Loading stations...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
